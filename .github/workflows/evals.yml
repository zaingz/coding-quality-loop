name: evals

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile helper and eval harness
        run: python3 -m py_compile scripts/*.py evals/*.py hosts/claude-code/*.py
      - name: Validate example orchestration config
        run: python3 scripts/quality_loop.py check-config assets/quality-loop.config.example.json
      - name: Run static eval cases
        run: python3 scripts/quality_loop.py eval-cases evals/cases --config assets/quality-loop.config.example.json
      - name: Run behavioral eval harness
        run: python3 evals/run_evals.py
      - name: Run memory eval harness
        run: python3 evals/run_memory_evals.py
      - name: Run reality eval harness
        run: python3 evals/run_reality_evals.py
      - name: Run host hook eval harness
        run: python3 evals/run_hook_evals.py
      - name: Run model routing eval harness
        run: python3 evals/run_routing_evals.py
      - name: Run control plane eval harness
        run: python3 evals/run_control_evals.py
      - name: Run benchmark fixture smoke
        run: python3 bench/runner.py --mode fixture --seeds 1 --out /tmp/quality-loop-fixture-smoke.json
      - name: Validate committed bench results (cost fields)
        run: |
          for res in bench/results/*.json; do
            echo "== $res =="
            python3 bench/runner.py --validate "$res"
          done
      - name: Gate example records (showcase must pass its own gate)
        run: |
          for rec in examples/*/agent-record.json; do
            echo "== $rec =="
            python3 scripts/quality_loop.py check-record "$rec"
            python3 scripts/quality_loop.py verify-gates "$rec"
          done

  # Dogfood this repo's own composite action against itself so action.yml
  # breakage (bad YAML, a broken shell branch, a py_compile failure) is caught
  # here instead of in a consumer repo. Soft: continue-on-error keeps gate
  # findings from blocking; a broken action shows a red step annotation on the
  # run page but does NOT fail the check — someone has to look to notice.
  dogfood-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run this repo's own action (uses: ./; soft)
        continue-on-error: true
        uses: ./
        with:
          base: origin/${{ github.base_ref || 'main' }}
