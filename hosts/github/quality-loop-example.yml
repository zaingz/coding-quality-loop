name: Quality Loop

on:
  pull_request:
  workflow_dispatch:

jobs:
  quality-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Pin the action to a tag or (better) a full commit SHA. The action runs
      # its OWN pinned copy of the gate scripts (via GITHUB_ACTION_PATH), never
      # the scripts in the checkout under review — so a softened local
      # quality_loop.py cannot defeat CI. That pinned copy is the trust anchor;
      # an unpinned/floating ref would surrender it. The release process bumps
      # this @vX.Y.Z pin on every tagged release.
      - uses: zaingz/coding-quality-loop@v6.5.0
        with:
          # Canonical record path; the action falls back to a root-level
          # agent-record.json when this is absent.
          record: .quality-loop/agent-record.json
          base: origin/${{ github.base_ref || 'main' }}
          red-green: "false"
