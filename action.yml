name: "Coding Quality Loop"
description: "Dependency-free outcome gates for coding agents."
inputs:
  record:
    description: "Path to the agent record JSON."
    required: false
    default: "agent-record.json"
  base:
    description: "Git base ref for diff checks."
    required: false
    default: "HEAD"
  run-evidence:
    description: "Deprecated in v3; kept for workflow compatibility. The verify umbrella always re-executes recorded pass commands."
    required: false
    default: "true"
  red-green:
    description: "Set to true to replay commands marked red_green at base and HEAD."
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Compile Quality Loop scripts
      shell: bash
      run: python3 -m py_compile scripts/*.py
    - name: Verify outcome gates
      shell: bash
      run: |
        if [ -f "${{ inputs.record }}" ]; then
          cmd=(python3 scripts/quality_loop.py verify "${{ inputs.record }}" --base "${{ inputs.base }}")
          if [ "${{ inputs.red-green }}" = "true" ]; then
            cmd+=(--red-green)
          fi
          "${cmd[@]}"
        else
          echo "No record found at ${{ inputs.record }}; running diff-audit only"
          python3 scripts/quality_loop.py diff-audit --base "${{ inputs.base }}"
        fi
